workflows:
  build-app:
    name: Build App
    environment:
      xcode: 13.3.1
      groups:
        - App Store Connect API
    scripts:
      - keychain initialize
      - app-store-connect fetch-signing-files "io.codemagic.banaan" --type IOS_APP_STORE --create
      - keychain add-certificates
      - xcode-project use-profiles
      - xcode-project build-ipa --project "ios-test2/banaan.xcodeproj" --scheme "banaan"
